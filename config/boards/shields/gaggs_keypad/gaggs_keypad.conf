# ZMK Studio 활성화 (필요한 경우)
CONFIG_ZMK_STUDIO=n
CONFIG_ZMK_USB=y

# 로터리 인코더 활성화 (사실)
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# 디스플레이 기본 활성화
CONFIG_ZMK_DISPLAY=y

# 사실(Fact): 화면 그리기 엔진(LVGL)에 16KB 메모리 강제 할당 (얼어붙음 해결 핵심)
CONFIG_LV_Z_MEM_POOL_SIZE=16384

# 사실(Fact): 디스플레이 전용 스레드를 만들어서 키 입력과 데이터 전송 충돌 방지
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y
